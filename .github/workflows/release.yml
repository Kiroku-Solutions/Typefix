name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: typefix-windows-x86_64.exe
            asset_name: typefix-${{ github.ref_name }}-windows-x86_64.exe
            use_wix: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-wix (Windows)
        if: matrix.use_wix
        run: cargo install cargo-wix

      - name: Create MSI Installer (Windows)
        if: matrix.use_wix
        run: cargo wix --no-build --target ${{ matrix.target }} --nocapture

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
            target/wix/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
