name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Release (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path typefix-release
          Copy-Item -Path target\${{ matrix.target }}\release\typefix.exe -Destination typefix-release\
          Copy-Item -Path config.json -Destination typefix-release\
          Copy-Item -Path data -Destination typefix-release\ -Recurse
          Compress-Archive -Path typefix-release\* -DestinationPath typefix-${{ github.ref_name }}-windows-x86_64.zip
        shell: powershell

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            typefix-${{ github.ref_name }}-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
